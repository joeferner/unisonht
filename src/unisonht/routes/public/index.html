<html lang="en">
<head>
    <title>UnisonHT</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="lib/onsenui/css/onsenui.css">
    <link rel="stylesheet" href="lib/onsenui/css/dark-onsen-css-components.css">
    <script src="lib/axios/dist/axios.js"></script>
    <script src="lib/prop-types/prop-types.min.js"></script>
    <script src="lib/react/umd/react.production.min.js"></script>
    <script src="lib/react-dom/umd/react-dom.production.min.js"></script>
    <script src="lib/onsenui/js/onsenui.js"></script>
    <script src="lib/react-onsenui/dist/react-onsenui.js"></script>
    <script src="lib/@babel/standalone/babel.js"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel">
  ons.platform.select('android');

  const loadedModules = {};

  function loadModule(path) {
    if (loadedModules[path]) {
      return Promise.resolve(loadedModules[path]);
    }
    return axios.get(path)
      .then((res) => {
        const code = '(function() {'
          + 'const module = {};'
          + Babel.transform(res.data, { presets: ['es2015', 'react'] }).code + ';'
          + 'return module;'
          + '})()';
        const c = eval(code);
        loadedModules[path] = c.exports;
        return c.exports;
      });
  }

  Promise.all([
    loadModule('/js/App.jsx'),
    loadModule('/js/utils.js'),
  ])
    .then(([App]) => {
      ReactDOM.render(<App/>, document.getElementById('app'));
    });
</script>
</body>
</html>
