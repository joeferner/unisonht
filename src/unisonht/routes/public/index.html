<html lang="en">
<head>
    <title>UnisonHT</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="lib/onsenui/css/onsenui.css">
    <link rel="stylesheet" href="lib/onsenui/css/dark-onsen-css-components.css">
    <script src="lib/prop-types/prop-types.min.js"></script>
    <script src="lib/react/umd/react.production.min.js"></script>
    <script src="lib/react-dom/umd/react-dom.production.min.js"></script>
    <script src="lib/onsenui/js/onsenui.js"></script>
    <script src="lib/react-onsenui/dist/react-onsenui.js"></script>
    <script src="lib/babel-standalone/babel.min.js"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel">
  function App() {
    const [menuClosed, setMenuClosed] = React.useState(true);
    const handleMenuOpenClick = React.useCallback(() => {
      setMenuClosed(!menuClosed);
    });

    return (<Ons.Splitter>
      <Ons.SplitterSide side="left" width="220px" collapse={menuClosed} swipeable>
        <Ons.Page>
          <Ons.List>
            <Ons.ListItem onclick="fn.load('home.html')" tappable>
              Home
            </Ons.ListItem>
            <Ons.ListItem onclick="fn.load('settings.html')" tappable>
              Settings
            </Ons.ListItem>
            <Ons.ListItem onclick="fn.load('about.html')" tappable>
              About
            </Ons.ListItem>
          </Ons.List>
        </Ons.Page>
      </Ons.SplitterSide>
      <Ons.SplitterContent id="content">
        <Ons.Page>
          <Ons.Toolbar>
            <div className="left">
              <Ons.ToolbarButton onClick={handleMenuOpenClick}>
                <Ons.Icon icon="md-menu"/>
              </Ons.ToolbarButton>
            </div>
            <div className="center">
              Main
            </div>
          </Ons.Toolbar>
        </Ons.Page>
      </Ons.SplitterContent>
    </Ons.Splitter>);
  }

  ReactDOM.render(<App/>, document.getElementById('app'));
  console.log('wee');
</script>
</body>
</html>
